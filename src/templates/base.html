{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Blogilf | {% block title %}{% endblock title %}</title>

    <!-- Bootstrap Core CSS -->
    <link href="{% static 'main/css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{% static 'main/css/simple-blog-template.css' %}" rel="stylesheet">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-inverse navbar-fixed-top" role="navigation">
        <div class="container">
            <!-- Brand and toggle get grouped for better mobile display -->
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
                <a class="navbar-brand" href="/">Blogilf</a>
            </div>
            <!-- Collect the nav links, forms, and other content for toggling -->
            <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
                <ul class="nav navbar-nav navbar-right">
                    {% if user.is_authenticated %}
                        <li>
                            <a title="New Article" href="/new"><span class='glyphicon glyphicon-plus'></span> New</a>
                        </li>
                        <li>
                            <a title="Profile" href="/account/profile"><span class='glyphicon glyphicon-user'></span> Profile</a>
                        </li>
                        <li>
                            <a title="Logout" href="/account/logout"><span class='glyphicon glyphicon-log-out'></span></a>
                        </li>
                    {% else %}
                        <li>
                            <a title="Login" href="/account/login"><span class='glyphicon glyphicon-log-in'></span> Login</a>
                        </li>
                        <li>
                            <a title="Sign up" href="/account/signup"><span class='glyphicon glyphicon-new-window'></span> Sign up</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
            <!-- /.navbar-collapse -->
        </div>
        <!-- /.container -->
    </nav>

    <!-- Page Content -->
    <div class="container">

        <div class="row">

            {% block row_content %}{% endblock row_content %}

        </div>
        <!-- /.row -->

    </div>
    <!-- /.container -->

    <!-- Footer -->
    <footer id="sticky-footer" class="{% block footer_classes %}{% endblock footer_classes %} text-white-50">
        <div class="container text-center">
          <small>Copyright &copy; Blogilf</small>
        </div>
    </footer>
    
    <!-- jQuery -->
    <script src="{% static 'main/js/jquery.js' %}"></script>

    <!-- Bootstrap Core JavaScript -->
    <script src="{% static 'main/js/bootstrap.min.js' %}"></script>

</body>

</html>
